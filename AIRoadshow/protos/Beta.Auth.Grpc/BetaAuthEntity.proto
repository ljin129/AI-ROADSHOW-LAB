syntax = "proto3";

option csharp_namespace = "Beta.Grpc.Auth.Entity";

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "BetaAuthEnumEntity.proto";

package Beta.Auth;

// Common
enum ResultCodeEnums {
  None = 0;
  OK = 200;
  Warning = 300;
  Error = 400;
  Exception = 500;
}

message BaseResult {
  ResultCodeEnums Code = 1;
  string Message = 2;
}

message Pagination {
  int32 pageSize = 1;
  int32 pageIndex = 2;
}

// 批量Int32Id
message Int32Ids { repeated int32 ids = 1; }

message IntKVCount {
  int32 K = 1;
  string V = 2;
  int32 C = 3;
}

message UserSimpleInfoItem {
  // 内部用户ID
  int32 InternalUserID = 1;
  // Beta理财师后台管理的用户角色
  int32 UserDuty = 2;
  // 用户类型
  CustUserTypeEnum CustUserType = 3;
}

message UserInfoItem {

  // 内部用户ID
  int32 InternalUserID = 1;

  // 加密的内部用户ID
  google.protobuf.StringValue InternalUserIDEnc = 2;

  // 用户ID
  google.protobuf.StringValue UserId = 3;

  // 全局唯一用户ID
  int64 BetaUnionID = 4;

  // 用户密码
  google.protobuf.StringValue Password = 5;

  // 客户端摘要信息，含用户机器信息，作为后续处理参数
  google.protobuf.StringValue DiskID = 6;

  // 用户姓名
  google.protobuf.StringValue UserName = 7;

  // 用户邮件地址
  google.protobuf.StringValue UserEmail = 8;

  // 用户所在公司
  google.protobuf.StringValue UserCompany = 9;

  // 用户所在公司ID
  int32 UserCompanyID = 10;

  // 用户电话号码
  google.protobuf.StringValue UserPhone = 11;

  // 用户手机号码
  google.protobuf.StringValue UserCellPhone = 12;

  // 用户类型
  UserTypeEnum UserType = 13;

  // 账号状态
  UserEnableEnum UserEnable = 14;

  // VIP账号状态
  UserStatusEnum UserStatus = 15;

  // 用户所属公司关联1001表的集团机构ID，主要用于本行代销
  int32 RelatedInstitutionID = 16;

  // 用户头像，完整url路径，直接可用，缩略图
  google.protobuf.StringValue UserPhoto = 17;

  // 用户头像，完整url路径，直接可用，原始大图
  google.protobuf.StringValue UserPhotoInit = 18;

  // 用户名片形象照，完整url路径，直接可用
  google.protobuf.StringValue UserCardPhoto = 19;

  // 用户二维码图片，完整url路径，直接可用
  google.protobuf.StringValue UserQRCode = 20;

  // 客户经理ID
  int32 SalesUserID = 21;

  // 微信用户ID
  google.protobuf.StringValue WeixinUserID = 22;

  // 微信是否核对过用户信息
  bool WeixinIsCheckInfo = 23;

  // 联系人ID
  int32 ContactUserID = 24;

  // 性别
  SexEnum UserSex = 25;

  // 部门/支行ID
  int32 DeptID = 26;

  // 部门/支行
  google.protobuf.StringValue DeptName = 27;

  // 网点ID
  int32 BranchID = 28;

  // 网点
  google.protobuf.StringValue BranchName = 29;

  // 到期时间
  google.protobuf.Timestamp RightItemEndDate = 30;

  // 激活时间
  google.protobuf.Timestamp ActivationTime = 31;

  // 是否填写过个人信息
  bool IsCheckInfo = 32;

  // 是否校验过手机号
  bool IsCellPhoneCheck = 33;

  // 交易权限标志，0表示没有交易权限，1表示有交易权限
  int32 TradeFlag = 34;

  // 佣金权限标志，0表示没有佣金权限，1表示有佣金权限
  int32 TradeFeeFlag = 35;

  // 所在地区ID
  int32 AreaID = 36;

  // 工作所在地区，包含完整的信息，包括城市所在的省份
  AreaItem WorkArea = 37;

  // 工作所在地区ID
  int32 WorkAreaID = 38;

  // 工作所在地区名称
  google.protobuf.StringValue WorkAreaName = 39;

  // 用户填写的所在公司
  google.protobuf.StringValue UserCompanyAlias = 40;

  // 用户职务
  google.protobuf.StringValue UserPosition = 41;

  // 微店名称，GetUserForShop才有该字段
  google.protobuf.StringValue ShopName = 42;

  // 自我介绍，GetUserForShop才有该字段
  google.protobuf.StringValue Introduction = 43;

  // 微信账号，GetUserForShop才有该字段
  google.protobuf.StringValue WeixinAccount = 44;

  // 参加工作时间，GetUserForShop才有该字段
  google.protobuf.Timestamp WorkBegin = 45;

  // 工作经历，GetUserForShop才有该字段
  repeated WorkItem WorkList = 46;

  // 教育经历，GetUserForShop才有该字段
  repeated EducationItem EducationList = 47;

  // 证书，GetUserForShop才有该字段
  repeated CertificateItem CertificateList = 48;

  // 理财师评分，GetUserExt方法才有该字段
  double UserRating = 49;

  // 实名认证状态，GetUserExt方法才有该字段
  IDCardCheckStatusEnum IDCardCheckStatus = 50;

  // 公司地址
  google.protobuf.StringValue CompanyAddress = 51;

  // VIP收费版开始时间
  google.protobuf.Timestamp UserVipStartTime = 52;

  // VIP收费版过期时间
  google.protobuf.Timestamp UserVipExpiryTime = 53;

  // VIP类型
  UserVipTypeEnum UserVipType = 54;

  // 用户总vip权限类型
  map<int32, VipItem> UserVipItems = 55;

  // 是否VIP收费版
  bool IsUserVip = 56;

  // 名片样式
  BusinessCardStyleEnum BusinessCardStyle = 57;

  // BETA理财师管理后台公司ID
  int32 CustCompanyID = 58;

  // 理财师推荐号
  google.protobuf.StringValue RecommendCode = 59;

  // 名片小店外部链接
  google.protobuf.StringValue CardShopUrl = 60;

  // 功能权限，按位运算
  FuncPermissionEnum FuncPermission = 61;

  // 徽章类型
  BadgeTypeEnum BadgeType = 62;

  // 创建时间
  google.protobuf.Timestamp RPGenDatetime = 63;

  // 真实姓名
  google.protobuf.StringValue RealName = 64;

  // Beta理财师后台管理的用户角色
  int32 UserDuty = 65;

  // 用户个人vip权限类型
  UserVipTypeEnum PersonalVipType = 66;

  // 用户驾驶舱vip权限类型
  UserVipTypeEnum CustVipType = 67;

  // APP，如Beta理财师和查私募app
  AppTypeEnum AppType = 68;

  // 保留驾驶舱
  google.protobuf.Int32Value CustCompanyIDStay = 69;

  // 账号登录过的APP：个位表示Beta理财师，十位表示查私募，百位表示上善SSFC，千位表示保险app，如1111表示都登录过
  int32 LoginAPP = 70;

  // 用户所在网点
  google.protobuf.StringValue UserBranch = 71;

  // 用户身份id
  int32 VerifyIdentityId = 72;

  // 先使用的手机号
  google.protobuf.StringValue DisplayPhoneNumber=73;
}
message SimpleUserItem {

  // 内部用户ID
  int32 InternalUserID = 1;

  // 用户ID
  google.protobuf.StringValue UserId = 2;

  // 用户姓名
  google.protobuf.StringValue UserName = 3;

  // 用户邮件地址
  google.protobuf.StringValue UserEmail = 4;

  // 用户所在公司
  google.protobuf.StringValue UserCompany = 5;

  // 用户所在公司ID
  int32 UserCompanyID = 6;

  // 用户电话号码
  google.protobuf.StringValue UserPhone = 7;

  // 用户手机号码
  google.protobuf.StringValue UserCellPhone = 8;

  // 用户手机号码，临时兼容安卓问题使用的
  // google.protobuf.StringValue UserMPhone { get { return this.UserCellPhone; }
  // }
  google.protobuf.StringValue UserMPhone = 9;

  // 用户头像，完整url路径，直接可用，缩略图
  google.protobuf.StringValue UserPhoto = 10;

  // 用户头像，完整url路径，直接可用，原始大图
  google.protobuf.StringValue UserPhotoInit = 11;

  // 用户名片形象照，完整url路径，直接可用
  google.protobuf.StringValue UserCardPhoto = 12;

  // 用户填写的所在公司
