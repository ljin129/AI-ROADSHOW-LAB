  // 用户职务
  google.protobuf.StringValue UserPosition = 14;

  // 自我介绍，GetUserForShop才有该字段
  google.protobuf.StringValue Introduction = 15;

  // 理财师评分，GetUserExt方法才有该字段
  double UserRating = 16;

  // 实名认证状态，GetUserExt方法才有该字段
  IDCardCheckStatusEnum IDCardCheckStatus = 17;

  // 收费版过期时间
  google.protobuf.Timestamp UserVipExpiryTime = 18;

  // 是否收费版
  bool IsUserVip = 19;

  // 功能权限，按位运算
  FuncPermissionEnum FuncPermission = 20;

  // 机构专区名称
