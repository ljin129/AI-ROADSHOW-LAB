  int32 CustCompanyID = 1;
  google.protobuf.Int32Value AliAppId = 2;
  google.protobuf.StringValue WwCorpId = 3;
  google.protobuf.StringValue WxAccountId=4;
  // 用户与外部用户ID关系枚举
