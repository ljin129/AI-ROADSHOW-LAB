  string UserRefID = 1;
  UserRefTypeEnum UserRefType = 2;
}

message BatchGetUserByRefIDReq{
  repeated string UserRefIDs = 1;
  UserRefTypeEnum UserRefType = 2;
}

message RequestUserIdRefType {
  int32 InternalUserId = 1;
  UserRefTypeEnum UserRefType = 2;
}

message BatchGetUserRefIDByRefTypeReq {
  repeated int32 InternalUserId = 1;
  UserRefTypeEnum UserRefType = 2;
}

