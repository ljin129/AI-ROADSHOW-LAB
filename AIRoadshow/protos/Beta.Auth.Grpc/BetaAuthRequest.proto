}

message RequestIdAndIdentity {
  int32 InternalUserId = 1;
  string IdentityCardNo = 2;
  string RealName = 3;
  int32 Verified = 4;
  bool Closed = 5;
  IdentityTypeEnum IdentityType=6;
}

message RequestUnionIDsWithFlag {
  repeated int64 BetaUnionIDs = 1;
  FromFlagEnum FromFlag = 2;
  google.protobuf.StringValue WwCorpId = 3;
}

