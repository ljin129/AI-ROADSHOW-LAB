message SyncRequestInternetIds { map<int64, int64> OldNewInternetIds = 1; }

message UpdateInternetIDRequest{ 
		int64 OldInternetId=1;
		int64 NewInternetId=2;
        FromFlagEnum FromFlag = 3;
        google.protobuf.StringValue ExtendTag=4;
}

message SyncRequestUserRef { UserRefItem UserRefInfo = 1; }

message SyncRequestCustCompanyIdWithInternalUserIds {
  int32 CustCompanyId = 1;
  repeated int32 InternalUserIds = 2;
}

message SyncRequestCustCompanyId { int32 CustCompanyId = 1; }

message SyncRequestSession { SessionItem SessionInfo = 1; }

message SyncRequestSessionId { string SessionId = 1; }

message SyncRequestrVipPackage {
  UserVipRefTypeEnum UserVipRefType = 1;
  int32 RefID = 2;
}

message SyncRequestIdentityId { string IdentityCardNo = 1; }

message RequestCustCompanyUser {
  int32 CustCompanyId = 1;
  int32 InternalUserId = 2;
  google.protobuf.Int32Value BadgeType = 3;
  google.protobuf.StringValue RealName = 4;
  google.protobuf.Int32Value UserDuty = 5;
  google.protobuf.Int32Value CustUserType = 6;
}

message RequestCustCompanyLogin {
  LoginSvcIDEnum loginSvcID = 1;
  string UserId = 2;
  string Password = 3;
  string Ip = 4;
  string ClientInfo = 5;
}

message RequestBetaUnionIdsWithCustCompanyId {
  int32 CustCompanyId = 1;
